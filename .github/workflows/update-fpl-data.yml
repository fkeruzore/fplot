name: Update FPL Data

on:
  schedule:
    # Midnight London time (GMT). During BST this runs at 1am London time.
    - cron: "0 0 * * *"
  workflow_dispatch: # Allow manual trigger

jobs:
  update-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
  
      - name: Install uv
        uses: astral-sh/setup-uv@v5
  
      - name: Install Python
        run: uv python install 3.12
      
      - name: Install the project
        run: uv sync --locked --dev

      - name: Fetch FPL data
        run: uv run python fetch_data.py

      - name: Generate visualization
        run: uv run python main.py

      - name: Check for image changes
        id: check_changes
        run: |
          if git diff --quiet imgs/; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push changes
        if: steps.check_changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ imgs/
          git commit -m "Update FPL data and visualization"
          git push
